name: GKE CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: ticketing-cluster
  GKE_ZONE: asia-southeast1-a
  IMAGE_NAME: ticketing-backend
  GAR_LOCATION: asia-southeast1-docker.pkg.dev

jobs:
  test:
    name: Unit Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd backend && npm ci
      - run: cd backend && npm run test

  build-and-push:
    name: Build & Push to Artifact Registry
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Docker Auth
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}
      - name: Build & Push
        run: |
          docker build -t ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/ticketing-repo/${{ env.IMAGE_NAME }}:${{ github.sha }} ./backend
          docker push ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/ticketing-repo/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-dev:
    name: Deploy to Dev
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}
      - name: Deploy
        run: |
          kubectl set image deployment/ticketing-backend ticketing-backend=${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/ticketing-repo/${{ env.IMAGE_NAME }}:${{ github.sha }} -n dev

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}
      - name: Deploy
        run: |
          kubectl set image deployment/ticketing-backend ticketing-backend=${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/ticketing-repo/${{ env.IMAGE_NAME }}:${{ github.sha }} -n staging

  deploy-prod:
    name: Deploy to Production
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}
      - name: Deploy
        run: |
          kubectl set image deployment/ticketing-backend ticketing-backend=${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/ticketing-repo/${{ env.IMAGE_NAME }}:${{ github.sha }} -n prod
